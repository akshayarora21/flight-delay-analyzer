spring.application.name=flight-delay-analyzer

# H2 in-memory database (switch to Postgres in prod by overriding these)
spring.datasource.url=jdbc:h2:mem:flightdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (useful during development — remove in prod)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# BTS CSV file path (put your downloaded CSV here)
app.bts.data-path=src/main/resources/bts_flights.csv

# How many rows to load (set to -1 for all rows)
app.bts.max-rows=-1

server.port=8080
