name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn compile -q

      - name: Run tests
        run: mvn test

      - name: Package
        run: mvn package -DskipTests -q

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flight-delay-analyzer:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name smoke -p 8080:8080 flight-delay-analyzer:${{ github.sha }}
          sleep 15
          curl --retry 5 --retry-delay 3 -f http://localhost:8080/api/v1/health
          docker stop smoke
